<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Ayufresh</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
.success-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--cream); padding: 40px 24px;
}
.success-card {
  background: var(--white); border-radius: var(--r-xl); padding: 64px 52px;
  text-align: center; max-width: 520px; width: 100%;
  box-shadow: var(--shadow-xl); border: 1px solid rgba(229,214,196,0.3);
  animation: scaleIn 0.6s ease-out both;
}
.success-icon {
  width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 28px;
  background: linear-gradient(135deg, var(--sand), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; color: var(--bark);
  animation: pulse 2s ease infinite;
}
.success-card h1 { font-size: 2rem; margin-bottom: 12px; }
.success-card p { color: var(--text-light); margin-bottom: 10px; line-height: 1.75; }
.order-id-box {
  margin: 28px 0; padding: 18px 24px;
  background: var(--sand-light); border-radius: var(--r-md);
  display: inline-block;
}
.order-id-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bark-mid); }
.order-id-val { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; color: var(--bark); margin-top: 4px; }
.order-total { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 700; color: var(--bark); margin: 16px 0; }
.success-actions { display: flex; gap: 14px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>Order Placed!</h1>
    <p>Thank you for choosing Ayufresh! Your order has been confirmed.</p>
    <p>We'll send you a confirmation via WhatsApp/SMS shortly.</p>
    <div class="order-id-box">
      <div class="order-id-label">Order ID</div>
      <div class="order-id-val" id="orderId">—</div>
    </div>
    <div class="order-total" id="orderTotal"></div>
    <p style="font-size:0.88rem;">Estimated delivery: 3–5 business days</p>
    <div class="success-actions">
      <a href="/" class="btn-primary"><span>Continue Shopping</span></a>
      <a href="/contact" class="btn-sand">Need Help?</a>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const total = params.get('total');
if (id) document.getElementById('orderId').textContent = id;
if (total) document.getElementById('orderTotal').textContent = '₹' + parseInt(total).toLocaleString('en-IN');
</script>
</body>
</html>
